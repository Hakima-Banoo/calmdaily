<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CalmDaily – Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--dark:#0E0E0E;--dark2:#181818;--dark3:#222;--text:#F0EAD6;--text-muted:#9A9080;--text-dim:#5C5550;--error:#E24B4A;--success:#4CAF80}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
.bg{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.ring{position:absolute;border-radius:50%;border:0.5px solid rgba(201,168,76,0.08)}
.ring1{width:600px;height:600px;top:50%;left:50%;transform:translate(-50%,-50%)}
.ring2{width:900px;height:900px;top:50%;left:50%;transform:translate(-50%,-50%)}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{width:100%;max-width:420px;background:var(--dark2);border:0.5px solid rgba(201,168,76,0.18);border-radius:20px;padding:2.5rem;position:relative;z-index:1}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;color:var(--gold);text-align:center;margin-bottom:0.25rem;text-decoration:none;display:block}
.logo em{color:var(--text);font-style:italic}
.tagline{text-align:center;font-size:0.78rem;color:var(--text-muted);letter-spacing:0.06em;margin-bottom:2rem}
.tabs{display:flex;background:var(--dark3);border-radius:50px;padding:4px;margin-bottom:2rem}
.tab{flex:1;padding:0.55rem;text-align:center;font-size:0.82rem;border-radius:50px;cursor:pointer;transition:all 0.2s;color:var(--text-muted);border:none;background:transparent}
.tab.active{background:var(--gold);color:var(--dark);font-weight:500}
.form-group{margin-bottom:1.25rem}
label{display:block;font-size:0.75rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.5rem}
input{width:100%;background:var(--dark3);border:0.5px solid rgba(201,168,76,0.15);border-radius:10px;padding:0.75rem 1rem;font-size:0.9rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
input:focus{border-color:var(--gold)}
input::placeholder{color:var(--text-dim)}
.btn{width:100%;padding:0.85rem;background:var(--gold);color:var(--dark);border:none;border-radius:50px;font-size:0.88rem;font-weight:500;cursor:pointer;transition:opacity 0.2s;font-family:'DM Sans',sans-serif;letter-spacing:0.04em;margin-top:0.5rem;display:flex;align-items:center;justify-content:center;gap:0.5rem}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--text-dim);font-size:0.78rem}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:rgba(255,255,255,0.08)}
.social-btn{width:100%;padding:0.75rem;background:transparent;color:var(--text);border:0.5px solid rgba(240,234,214,0.15);border-radius:50px;font-size:0.85rem;cursor:pointer;transition:border-color 0.2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:0.6rem}
.social-btn:hover{border-color:rgba(201,168,76,0.4)}
.alert{border-radius:8px;padding:0.65rem 0.85rem;font-size:0.82rem;margin-bottom:1rem;display:none}
.alert-error{background:rgba(226,75,74,0.1);border:0.5px solid rgba(226,75,74,0.3);color:#E24B4A}
.alert-success{background:rgba(76,175,128,0.1);border:0.5px solid rgba(76,175,128,0.3);color:#4CAF80}
.forgot{text-align:right;margin-top:-0.75rem;margin-bottom:1rem}
.forgot a{font-size:0.78rem;color:var(--text-muted);text-decoration:none;cursor:pointer}
.forgot a:hover{color:var(--gold)}
.terms{font-size:0.73rem;color:var(--text-dim);text-align:center;margin-top:1.25rem;line-height:1.6}
.terms a{color:var(--text-muted);text-decoration:none}
.spinner{width:16px;height:16px;border:2px solid rgba(14,14,14,0.3);border-top-color:var(--dark);border-radius:50%;animation:spin 0.6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:2.75rem}
.pw-eye{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:1rem;padding:0;line-height:1}
.config-banner{background:rgba(201,168,76,0.08);border:0.5px solid rgba(201,168,76,0.25);border-radius:10px;padding:0.85rem;margin-bottom:1.25rem;font-size:0.78rem;color:#E8D5A3;line-height:1.6;display:none}
.config-banner code{background:rgba(0,0,0,0.3);padding:0.1rem 0.3rem;border-radius:4px;font-size:0.72rem}
</style>
</head>
<body>
<div class="bg"><div class="ring ring1"></div><div class="ring ring2"></div></div>
<div class="page">
  <div class="card">
    <a href="../index.html" class="logo">Calm<em>Daily</em></a>
    <p class="tagline">Your daily wellness ritual</p>

    <!-- Firebase is configured ✅ -->

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign in</button>
      <button class="tab" onclick="switchTab('signup')">Create account</button>
    </div>

    <div id="alert-box" class="alert"></div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password"/>
          <button class="pw-eye" onclick="togglePwd('login-password',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <div class="forgot"><a onclick="handleForgotPassword()">Forgot password?</a></div>
      <button class="btn" id="login-btn" onclick="handleLogin()">
        <span id="login-label">Sign in</span>
        <div class="spinner" id="login-spin"></div>
      </button>
      <div class="divider">or</div>
      <button class="social-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGNUP -->
    <div id="signup-form" style="display:none">
      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="signup-name" placeholder="Your name" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password"/>
          <button class="pw-eye" onclick="togglePwd('signup-password',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn" id="signup-btn" onclick="handleSignup()">
        <span id="signup-label">Create account</span>
        <div class="spinner" id="signup-spin"></div>
      </button>
      <div class="divider">or</div>
      <button class="social-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>
      <p class="terms">By creating an account you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
/*
  ════════════════════════════════════════════════════════
  STEP 1 — Replace the firebaseConfig below with YOUR
  real Firebase config.

  How to get it:
  1. Go to console.firebase.google.com
  2. Create project → "calmdaily"
  3. Add web app → copy the config object shown
  4. Paste it here replacing the placeholder values
  ════════════════════════════════════════════════════════
*/
import { initializeApp }            from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         updateProfile, signInWithPopup, GoogleAuthProvider,
         sendPasswordResetEmail, sendEmailVerification, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBulJe89bbyPa80HBFUbQZ41RnPCv5WjHM",
  authDomain:        "calmdaily-fd193.firebaseapp.com",
  projectId:         "calmdaily-fd193",
  storageBucket:     "calmdaily-fd193.firebasestorage.app",
  messagingSenderId: "1070185387201",
  appId:             "1:1070185387201:web:fe2351baf1c59c7d127040",
  measurementId:     "G-CR2GWK7E4H"
};

/* ── detect unconfigured state ─────────────────────────── */
const isConfigured = true; // Firebase is configured ✅
if (!isConfigured) {
  document.getElementById('config-banner').style.display = 'block';
}

const app      = isConfigured ? initializeApp(firebaseConfig) : null;
const auth     = isConfigured ? getAuth(app) : null;
const db       = isConfigured ? getFirestore(app) : null;
const provider = isConfigured ? new GoogleAuthProvider() : null;

/* ── redirect if already signed in ────────────────────── */
if (auth) {
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'dashboard.html';
  });
}

/* ── helpers ───────────────────────────────────────────── */
function showAlert(msg, type='error') {
  const el = document.getElementById('alert-box');
  el.textContent = msg;
  el.className = 'alert alert-' + type;
  el.style.display = 'block';
}
function hideAlert() { document.getElementById('alert-box').style.display='none' }

function setLoading(id, on) {
  document.getElementById(id+'-btn').disabled = on;
  document.getElementById(id+'-label').style.display = on ? 'none' : 'inline';
  document.getElementById(id+'-spin').style.display  = on ? 'block' : 'none';
}

function friendlyError(code) {
  const map = {
    'auth/user-not-found':       'No account found with this email.',
    'auth/wrong-password':       'Incorrect password. Please try again.',
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/weak-password':        'Password must be at least 8 characters.',
    'auth/invalid-email':        'Please enter a valid email address.',
    'auth/too-many-requests':    'Too many attempts. Please wait a moment.',
    'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
    'auth/network-request-failed':'Network error. Check your connection.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

async function saveUserToFirestore(user, extraData={}) {
  if (!db) return;
  const ref  = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      uid:       user.uid,
      name:      user.displayName || extraData.name || '',
      email:     user.email,
      plan:      'free',
      joined:    serverTimestamp(),
      ...extraData,
    });
  }
}

async function goToDashboard(user, isNewUser = false) {
  localStorage.setItem('calmdaily_session', JSON.stringify({
    uid:   user.uid,
    name:  user.displayName || '',
    email: user.email,
    plan:  'free',
  }));
  // New users go through onboarding first
  const hasOnboarded = localStorage.getItem('calmdaily_onboarding');
  if (isNewUser || !hasOnboarded) {
    window.location.href = 'onboarding.html';
  } else {
    window.location.href = 'dashboard.html';
  }
}

/* ── Login ─────────────────────────────────────────────── */
window.handleLogin = async function() {
  if (!isConfigured) { showAlert('Please configure Firebase first. See the banner above.'); return; }
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showAlert('Please fill in all fields.'); return; }
  hideAlert(); setLoading('login', true);
  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    showAlert('Welcome back! Redirecting…', 'success');
    await goToDashboard(cred.user);
  } catch (e) {
    showAlert(friendlyError(e.code));
  } finally {
    setLoading('login', false);
  }
};

/* ── Signup ────────────────────────────────────────────── */
window.handleSignup = async function() {
  if (!isConfigured) { showAlert('Please configure Firebase first. See the banner above.'); return; }
  const name     = document.getElementById('signup-name').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name || !email || !password) { showAlert('Please fill in all fields.'); return; }
  if (password.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
  hideAlert(); setLoading('signup', true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await saveUserToFirestore(cred.user, { name });
    // Send email verification
    await sendEmailVerification(cred.user);
    showAlert('Account created! Check your inbox to verify your email. Redirecting… 🌟', 'success');
    setTimeout(async () => await goToDashboard(cred.user, true), 1500);
  } catch (e) {
    showAlert(friendlyError(e.code));
  } finally {
    setLoading('signup', false);
  }
};

/* ── Google Auth ───────────────────────────────────────── */
window.handleGoogle = async function() {
  if (!isConfigured) { showAlert('Please configure Firebase first. See the banner above.'); return; }
  try {
    const cred = await signInWithPopup(auth, provider);
    await saveUserToFirestore(cred.user);
    await goToDashboard(cred.user);
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') showAlert(friendlyError(e.code));
  }
};

/* ── Forgot password ───────────────────────────────────── */
window.handleForgotPassword = async function() {
  if (!isConfigured) { showAlert('Please configure Firebase first.'); return; }
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showAlert('Enter your email address above first.'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showAlert('Password reset email sent! Check your inbox.', 'success');
  } catch (e) {
    showAlert(friendlyError(e.code));
  }
};

/* ── UI helpers exposed to HTML ────────────────────────── */
window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('login-form').style.display  = tab==='login'  ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab==='signup' ? 'block' : 'none';
  hideAlert();
};

window.togglePwd = function(id, btn) {
  const el = document.getElementById(id);
  el.type  = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
};
</script>
</body>
</html>
